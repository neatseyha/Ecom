{% extends "base.html" %}

{% block title %}Reset Password - Clothery{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>Reset Password</h1>
        <p>Account Recovery</p>
    </div>
</section>

<section class="login-section" style="padding: 5rem 0;">
    <div class="container" style="max-width: 500px;">
        <div class="login-form" style="background: var(--bg-surface); padding: 3rem; border: 1px solid var(--border-color); border-radius: var(--radius-lg); text-align: center;">
            <h2 style="font-weight: 300; margin-bottom: 2rem;">Set New Password</h2>
            
            {% if error %}
            <div class="alert alert-danger" style="font-size: 0.9rem; background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 4px; border: 1px solid #fecaca; margin-bottom: 1rem;">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('reset_password') }}">
                <div class="form-group" style="text-align: left;">
                    <label for="email">Account Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="customer@example.com">
                </div>

                <div class="form-group" style="text-align: left;">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-action" style="width: 100%; margin-top: 1rem;">Update Password</button>
                
                <p style="margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                    Remembered it? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600; text-decoration: underline;">Login here</a>
                </p>
            </form>
        </div>
    </div>
</section>
{% endblock %}
