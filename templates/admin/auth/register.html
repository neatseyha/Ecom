<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Register - Clothery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/admin.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-logo">CL</div>
                <div class="auth-brand-text">
                    <h2>CLOTHERY</h2>
                    <p>Admin Panel</p>
                </div>
            </div>

            <div class="auth-title">
                <h3>Create Account</h3>
                <p>Register to manage your store</p>
            </div>

            {% if message %}
                <div class="auth-alert auth-alert-{{ message_type }}">{{ message }}</div>
            {% endif %}

            <form method="post" action="{{ url_for('auth.register') }}">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" placeholder="Choose a username" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="registerPassword" name="password" placeholder="Create a password" required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="confirmPassword" name="confirm_password" placeholder="Confirm your password" required>
                    </div>
                </div>

                <button type="submit" class="btn-admin btn-admin-primary">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
            </div>
        </div>
    </div>

    <style>
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--admin-text-secondary);
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--admin-accent);
            font-weight: 600;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('togglePassword');
            const pwd = document.getElementById('registerPassword');
            
            if (toggle && pwd) {
                toggle.addEventListener('click', function() {
                    if (pwd.type === 'password') {
                        pwd.type = 'text';
                        toggle.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
                    } else {
                        pwd.type = 'password';
                        toggle.innerHTML = '<i class="fa-solid fa-eye"></i>';
                    }
                });
            }
        });
    </script>
</body>
</html>
