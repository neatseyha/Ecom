{% extends "base.html" %}

{% block title %}Sign Up - Clothery{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>Create Account</h1>
        <p>Join Clothery today</p>
    </div>
</section>

<section class="login-section" style="padding: 5rem 0;">
    <div class="container" style="max-width: 500px;">
        <div class="login-form" style="background: var(--bg-surface); padding: 3rem; border: 1px solid var(--border-color); border-radius: var(--radius-lg); text-align: center;">
            <h2 style="font-weight: 300; margin-bottom: 2rem;">Sign Up</h2>

            <form method="POST" action="{{ url_for('signup') }}" id="signupForm" onsubmit="return validateSignupForm()">
                <div class="form-group" style="text-align: left;">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe" style="border: 1px solid var(--border-color); padding: 0.75rem; border-radius: 4px; width: 100%; font-family: var(--font-body);">
                    <div class="form-error" id="nameError"></div>
                </div>

                <div class="form-group" style="text-align: left;">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="customer@example.com" style="border: 1px solid var(--border-color); padding: 0.75rem; border-radius: 4px; width: 100%; font-family: var(--font-body);">
                    <div class="form-error" id="emailError"></div>
                </div>

                <div class="form-group" style="text-align: left;">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••" style="border: 1px solid var(--border-color); padding: 0.75rem; border-radius: 4px; width: 100%; font-family: var(--font-body);">
                    <div class="form-error" id="passwordError"></div>
                </div>

                <button type="submit" class="btn btn-action" style="width: 100%; margin-top: 1rem;">Create Account</button>
                
                <p style="margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                    Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600; text-decoration: underline;">Login</a>
                </p>
            </form>

            <script>
                function validateSignupForm() {
                    const name = document.getElementById('name').value;
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    let isValid = true;

                    // Clear previous errors
                    document.getElementById('nameError').textContent = '';
                    document.getElementById('emailError').textContent = '';
                    document.getElementById('passwordError').textContent = '';

                    // Validate name
                    if (name.length < 2) {
                        document.getElementById('nameError').textContent = 'Full name must be at least 2 characters';
                        document.getElementById('name').classList.add('is-invalid');
                        isValid = false;
                    } else {
                        document.getElementById('name').classList.remove('is-invalid');
                    }

                    // Validate email
                    if (!validateEmail(email)) {
                        document.getElementById('emailError').textContent = 'Please enter a valid email address';
                        document.getElementById('email').classList.add('is-invalid');
                        isValid = false;
                    } else {
                        document.getElementById('email').classList.remove('is-invalid');
                    }

                    // Validate password
                    if (password.length < 8) {
                        document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
                        document.getElementById('password').classList.add('is-invalid');
                        isValid = false;
                    } else if (!/[A-Z]/.test(password)) {
                        document.getElementById('passwordError').textContent = 'Password must contain at least one uppercase letter';
                        document.getElementById('password').classList.add('is-invalid');
                        isValid = false;
                    } else if (!/[0-9]/.test(password)) {
                        document.getElementById('passwordError').textContent = 'Password must contain at least one number';
                        document.getElementById('password').classList.add('is-invalid');
                        isValid = false;
                    } else {
                        document.getElementById('password').classList.remove('is-invalid');
                    }

                    return isValid;
                }

                // Real-time validation on input
                document.getElementById('name').addEventListener('blur', function() {
                    if (this.value.length >= 2) {
                        this.classList.remove('is-invalid');
                        document.getElementById('nameError').textContent = '';
                    }
                });

                document.getElementById('email').addEventListener('blur', function() {
                    if (validateEmail(this.value)) {
                        this.classList.remove('is-invalid');
                        document.getElementById('emailError').textContent = '';
                    }
                });

                document.getElementById('password').addEventListener('blur', function() {
                    if (this.value.length >= 8 && /[A-Z]/.test(this.value) && /[0-9]/.test(this.value)) {
                        this.classList.remove('is-invalid');
                        document.getElementById('passwordError').textContent = '';
                    }
                });
            </script>
        </div>
    </div>
</section>
{% endblock %}
