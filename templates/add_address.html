{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h2 class="mb-4">Add New Address</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else 'warning' }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="card">
                    <div class="card-body">
                        <!-- Address Type -->
                        <div class="mb-3">
                            <label for="type" class="form-label">Address Type *</label>
                            <select class="form-select" id="type" name="type" required>
                                <option value="">Select address type</option>
                                <option value="shipping">Shipping Address</option>
                                <option value="billing">Billing Address</option>
                            </select>
                        </div>

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="full_name" class="form-label">Full Name *</label>
                            <input type="text" class="form-control" id="full_name" name="full_name" required placeholder="John Doe">
                        </div>

                        <!-- Phone -->
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone Number *</label>
                            <input type="tel" class="form-control" id="phone" name="phone" required placeholder="+1 (555) 123-4567">
                        </div>

                        <!-- Street Address -->
                        <div class="mb-3">
                            <label for="street_address" class="form-label">Street Address *</label>
                            <input type="text" class="form-control" id="street_address" name="street_address" required placeholder="123 Main Street, Apt 456">
                        </div>

                        <!-- City -->
                        <div class="mb-3">
                            <label for="city" class="form-label">City *</label>
                            <input type="text" class="form-control" id="city" name="city" required placeholder="New York">
                        </div>

                        <!-- State/Province -->
                        <div class="mb-3">
                            <label for="state" class="form-label">State/Province *</label>
                            <input type="text" class="form-control" id="state" name="state" required placeholder="NY">
                        </div>

                        <!-- Postal Code -->
                        <div class="mb-3">
                            <label for="zip_code" class="form-label">Postal Code *</label>
                            <input type="text" class="form-control" id="zip_code" name="zip_code" required placeholder="10001">
                        </div>

                        <!-- Country -->
                        <div class="mb-3">
                            <label for="country" class="form-label">Country *</label>
                            <input type="text" class="form-control" id="country" name="country" required placeholder="United States">
                        </div>

                        <!-- Set as Default -->
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="is_default" name="is_default" value="on">
                            <label class="form-check-label" for="is_default">
                                Set as default address
                            </label>
                        </div>
                    </div>

                    <div class="card-footer bg-light">
                        <button type="submit" class="btn btn-primary">Save Address</button>
                        <a href="{{ url_for('address.address_list') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
