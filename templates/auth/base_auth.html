<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Login - FashionHub{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Design System CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">

    <style>
        body.auth-page { background: #f5f7fb; font-family: 'Sora', sans-serif; }
        .auth-container { min-height: 100vh; display:flex; align-items:center; justify-content:center; }
        .auth-card { width:100%; max-width:440px; }
        .brand { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
        .brand .logo { width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:var(--primary-color); color:#fff; border-radius:8px; font-weight:700; }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
