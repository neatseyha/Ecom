<!-- TOP BAR COMPONENT - CLEAN & SIMPLE -->
<div class="top-bar">
    <!-- Left Section: Menu Toggle + Page Info -->
    <div class="page-header-topbar">


        <div class="module-copy">
            <h2 class="module-title">
                {% if module_icon %}
                    <i class="fas {{ module_icon }}"></i>
                {% endif %}
                {{ module_name or 'Dashboard' }}
            </h2>
        </div>
    </div>

    <!-- Right Section: Notifications + User Avatar -->
    <div class="top-actions">
        <div class="notification-bell" id="notificationBell" style="cursor: pointer; position: relative;">
            <i class="fas fa-bell"></i>
            <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
        </div>

        {% if session.get('user_name') %}
        <div class="user-avatar-display">
            <div class="admin-avatar">{{ session.get('user_name')[0:2]|upper }}</div>
        </div>
        {% else %}
        <a href="{{ url_for('auth.login') }}" class="btn btn-sm btn-primary">Login</a>
        {% endif %}
    </div>
</div>

<!-- Notification Modal -->
<div class="modal fade" id="notificationModal" tabindex="-1" aria-labelledby="notificationLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="notificationLabel"><i class="fas fa-bell"></i> Customer Order Notifications</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="notificationBody">
                <div class="text-center">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .user-avatar-display {
        display: flex;
        align-items: center;
        padding: 4px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .user-avatar-display:hover {
        background: var(--bg-tertiary);
    }

    .user-avatar-display .admin-avatar {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
        color: white;
        font-size: 0.8rem;
        font-weight: 700;
    }

    .notification-item {
        padding: 1rem;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background 0.2s ease;
    }

    .notification-item:hover {
        background: var(--bg-tertiary);
    }

    .notification-item:last-child {
        border-bottom: none;
    }

    .notification-item-text {
        flex: 1;
    }

    .notification-item-text strong {
        display: block;
        margin-bottom: 4px;
    }

    .notification-item-status {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: capitalize;
        white-space: nowrap;
        margin-left: 1rem;
    }

    .notification-item-status.pending {
        background: #fef3c7;
        color: #92400e;
    }

    .notification-item-status.completed {
        background: #d1fae5;
        color: #065f46;
    }

    .notification-item-status.processing {
        background: #dbeafe;
        color: #0c2d6b;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const notificationBell = document.getElementById('notificationBell');
    const notificationBadge = document.getElementById('notificationBadge');
    
    // Update badge count when page loads
    updateBadgeCount();
    
    if (notificationBell) {
        notificationBell.addEventListener('click', function(e) {
            e.preventDefault();
            showNotifications();
        });
    }
});

function updateBadgeCount() {
    // Fetch real notification count
    fetch('/api/notifications')
        .then(response => response.json())
        .then(data => {
            const badge = document.getElementById('notificationBadge');
            if (data.count > 0) {
                badge.textContent = data.count > 99 ? '99+' : data.count;
                badge.style.display = 'inline-flex';
            } else {
                badge.style.display = 'none';
            }
        })
        .catch(error => console.error('Error fetching notification count:', error));
}

function showNotifications() {
    const notificationModal = new bootstrap.Modal(document.getElementById('notificationModal'));
    const notificationBody = document.getElementById('notificationBody');
    
    // Set badge to 0 and hide it when viewed
    const badge = document.getElementById('notificationBadge');
    if (badge) {
        badge.style.display = 'none';
        badge.textContent = '0';
    }
    
    // Show loading state
    notificationBody.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"><span class="visually-hidden">Loading...</span></div></div>';
    
    // Fetch notifications from API
    fetch('/api/notifications')
        .then(response => response.json())
        .then(data => {
            if (data.success && data.notifications.length > 0) {
                let html = '';
                data.notifications.forEach(notif => {
                    html += `
                        <div class="notification-item">
                            <div class="notification-item-text">
                                <strong>${notif.customer}</strong>
                                <small class="text-muted">${notif.message}</small>
                                <br>
                                <small class="text-muted" style="font-size: 0.75rem;">${notif.date}</small>
                            </div>
                            <span class="notification-item-status ${notif.status.toLowerCase()}">${notif.status}</span>
                        </div>
                    `;
                });
                notificationBody.innerHTML = html;
            } else {
                notificationBody.innerHTML = '<div class="alert alert-info text-center">No notifications available</div>';
            }
        })
        .catch(error => {
            console.error('Error fetching notifications:', error);
            notificationBody.innerHTML = '<div class="alert alert-danger text-center">Error loading notifications</div>';
        });
    
    notificationModal.show();
}
</script>
