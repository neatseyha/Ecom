<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .product-card {
            transition: 0.3s;
        }

        .product-card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .product-img {
            height: 200px;
            object-fit: contain;
        }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card product-card h-100">
                <img src="https://fakestoreapi.com/img/71li-ujtlUL._AC_UX679_t.png"
                     class="card-img-top product-img p-3">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Another Product</h5>
                    <p class="card-text text-muted">Nice product description.</p>

                    <div class="mt-auto">
                        <p class="price">៛100</p>
                        <a href="/payment?price=100" class="btn btn-success w-100">Buy Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
