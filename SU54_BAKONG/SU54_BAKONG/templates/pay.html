<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Payment</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
        }

        .payment-card {
            border-radius: 20px;
            overflow: hidden;
        }

        .qr-box {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
        }

        .qr-img {
            width: 200px;
            height: 200px;
            object-fit: contain;
        }

        .amount {
            font-size: 2rem;
            font-weight: bold;
            color: #28a745;
        }

        .timer {
            font-size: 0.9rem;
            color: #dc3545;
        }
    </style>
</head>
<body>

<div id="app" class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card payment-card shadow-lg p-4 text-center col-md-4">

        <!-- Title -->
        <h4 class="mb-3">Scan to Pay</h4>
        <p class="text-muted">Use your banking app to scan QR code</p>

        <!-- QR Code -->
        <div class="qr-box mb-3">
            <img src="./static/qrcode.png"
                 class="qr-img"
                 alt="QR Code">
        </div>

        <!-- Amount -->
        <div class="amount mb-2">៛{{ price }}</div>
        <p class="text-muted mb-3">Order #12345</p>

        <!-- Timer -->
        <div class="timer mb-3">Expires in: 04:59</div>

        <!-- Buttons -->
        <button class="btn btn-success w-100 mb-2">I Have Paid</button>
        <button class="btn btn-outline-secondary w-100">Cancel</button>

        <!-- Footer -->
        <small class="text-muted mt-3">
            Powered by KHQR / ABA / Wing
        </small>

        <input type="hidden" value="{{ qr }}">

    </div>
</div>

</body>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
const { createApp } = Vue

createApp({
    data() {
        return {
            qrcode: '{{ qr }}',
            intervalId: null
        }
    },

    methods: {
        checkStatus() {
            axios.get('/check_status?qrcode=' + this.qrcode)
                .then((response) => {
                    console.log(response.data);

                    // ✅ Example: stop polling if paid
                    if (response.data === 'PAID') {
                        clearInterval(this.intervalId);
                        alert("Payment Successful!");
                    }
                })
                .catch((error) => {
                    console.log(error);
                });
        }
    },

    mounted() {
        // run immediately
        this.checkStatus();

        // run every 3 seconds
        this.intervalId = setInterval(() => {
            this.checkStatus();
        }, 3000);
    },
    beforeUnmount() {
        // cleanup when leaving page
        clearInterval(this.intervalId);
    }
}).mount('#app')
</script>
</html>
